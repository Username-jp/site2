<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aki's Digital Creations - Paint - portfolio.html</title>
    
    <!-- 👇ここから：Windows 95/98風のデザインを呼び出すコードを追加 -->
    <link rel="stylesheet" href="https://unpkg.com/95.css">
    <style>
        /* ツールボックス全体のデザイン */
.toolbox {
    width: 56px; /* 2列が綺麗に収まる幅 */
    background: #cbd0d4;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    padding: 2px;
    margin-right: 4px;
    display: flex;
    flex-direction: column;
}

/* 16個のボタンを2列に並べる */
.tool-grid {
    display: grid;
    grid-template-columns: repeat(2, 25px);
    grid-auto-rows: 22px;
    gap: 1px;
}

/* ペイントのボタン1個ずつの立体感 */
.tool-btn {
    background: #cbd0d4;
    border: 1.5px solid;
    border-color: #fff #808080 #808080 #fff; /* 凸型の立体感 */
    padding: 0;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    background-repeat: no-repeat;
    background-position: center;
}

/* ボタンがクリックされた（選択された）時、凹むようにする */
.tool-btn:active, .tool-btn.selected {
    border-color: #808080 #fff #fff #808080; /* 凹型の立体感 */
    background-color: #e4e4e4; /* ちょっと明るく */
}
        /* 画面全体をペイント風にレイアウトするための最低限の設定 */
        body {
            background-color: #55aaaa; /* あの懐かしい青緑色 */
            padding: 10px;
            margin: 0;
            font-family: "MS Sans Serif", "MS Pゴシック", sans-serif;
        }
        .main-content {
            display: flex;
            background: #cbd0d4;
            padding: 4px;
        }
        .toolbox {
            width: 50px;
            background: #cbd0d4;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            margin-right: 4px;
        }
        .canvas-container {
            flex-grow: 1;
            background: #808080;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .paint-canvas {
            background: white;
            width: 100%;
            max-width: 800px;
            min-height: 400px;
            padding: 20px;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
        }
        .color-box {
            background: #cbd0d4;
            padding: 5px;
            border-top: 2px solid #fff;
            display: flex;
        }
    </style>
    <!-- 👆ここまで追加・書き換え -->

</head>
<body class="paint-program">

    <!-- 1. 最上部：タイトルバー -->
    <div class="title-bar">
        <div class="title-bar-text">
            <img src="paint-icon.png" alt="" class="program-icon"> Aki's Digital Creations - Paint - portfolio.html
        </div>
        <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
        </div>
    </div>

    <!-- 2. メニューバー -->
    <div class="menu-bar">
        <div class="menu-item">ファイル(F)</div>
        <div class="menu-item">編集(E)</div>
        <div class="menu-item">表示(V)</div>
        <div class="menu-item">変形(I)</div>
        <div class="menu-item">色(C)</div>
        <div class="menu-item">ヘルプ(H)</div>
    </div>

    <!-- 3. メイン作業エリア（ツールBOX ＋ キャンバス） -->
    <div class="main-content">
        
        <!-- 左側：ツールボックス（16個のアイコン） -->
        <div class="toolbox">

<div class="tool-grid">
    <button class="tool-btn icon-freehand-select" title="自由選択"></button>
    <button class="tool-btn icon-select" title="選択"></button>
    <button class="tool-btn icon-eraser" title="消しゴム"></button>
    <button class="tool-btn icon-fill" title="塗りつぶし"></button>
    <button class="tool-btn icon-dropper" title="色の選択"></button>
    <button class="tool-btn icon-magnifier" title="虫眼鏡"></button>
    <button class="tool-btn icon-pencil" title="鉛筆"></button>
    <button class="tool-btn icon-brush" title="ブラシ"></button>
    <button class="tool-btn icon-airbrush" title="エアブラシ"></button>
    <button class="tool-btn icon-text" title="テキスト"></button>
    <button class="tool-btn icon-line" title="直線"></button>
    <button class="tool-btn icon-curve" title="曲線"></button>
    <button class="tool-btn icon-rectangle" title="長方形"></button>
    <button class="tool-btn icon-polygon" title="多角形"></button>
    <button class="tool-btn icon-ellipse" title="楕円"></button>
    <button class="tool-btn icon-rounded-rectangle" title="角丸長方形"></button>
</div>
            <!-- ツール選択時のオプション領域（線の太さなど） -->
            <div class="tool-options"></div>
        </div>

        <!-- 中央：キャンバス（ここにイラストや文字を配置） -->
        <div class="canvas-container">
            <div class="paint-canvas">
                
                <!-- ポートフォリオのメインコンテンツ -->
                <div class="portfolio-content">
                    
                    <!-- メインのドット絵など -->
                    <div class="character-zone">
                        <img src="dino-pixel.png" alt="メインキャラクター" class="pixel-art">
                    </div>

                    <!-- 展示する作品たち（イーゼルに乗ったイラスト） -->
                    <div class="gallery-zone">
                        <div class="easel-item">
                            <img src="sunset-pixel.png" alt="作品1: 夕焼けの街">
                        </div>
                        <div class="easel-item">
                            <img src="ui-design-pixel.png" alt="作品2: レトロUI">
                        </div>
                    </div>

                    <!-- サイトのタイトル文字（ドットフォント風にする部分） -->
                    <div class="canvas-title">
                        <h2>AKI'S DIGITAL CREATIONS</h2>
                        <h1>PORTFOLIO</h1>
                    </div>

                </div>

                <!-- キャンバスの右下・真下にあるサイズ調整用の青いドット -->
                <div class="resize-dot bottom-right"></div>
                <div class="resize-dot bottom"></div>
                <div class="resize-dot right"></div>
            </div>
        </div>

    </div>

    <!-- 4. 下部：カラーパレット -->
    <div class="color-box">
        <!-- 現在選択されている色（左側の二重の四角） -->
        <div class="current-colors">
            <div class="color-preview back-color"></div>
            <div class="color-preview fore-color"></div>
        </div>
        <!-- 選択できる色の一覧（2段のカラーグリッド） -->
        <div class="color-palette">
            <div class="palette-row">
                <div class="color-swatch" style="background: #000000;"></div>
                <div class="color-swatch" style="background: #808080;"></div>
                <div class="color-swatch" style="background: #800000;"></div>
                <!-- 必要な分だけ色を並べます -->
            </div>
            <div class="palette-row">
                <div class="color-swatch" style="background: #ffffff;"></div>
                <div class="color-swatch" style="background: #c0c0c0;"></div>
                <div class="color-swatch" style="background: #ff0000;"></div>
                <!-- 2段目の色 -->
            </div>
        </div>
    </div>

    <!-- 5. 最下部：ステータスバー -->
    <div class="status-bar">
        <div class="status-field main-status">Ready. Click an icon to explore.</div>
        <div class="status-field position-status"></div>
        <div class="status-field size-status"></div>
    </div>

</body>
</html>
