<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャンマナ</title>
    
    <!-- Windows 95/98風のデザインシステム -->
    <link rel="stylesheet" href="https://unpkg.com/95.css">
    
    <style>
        body {
            background-color: #55aaaa;
            padding: 20px;
            margin: 0;
            font-family: "MS Sans Serif", "MS Pゴシック", sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ペイントのウィンドウ全体 */
        .window.paint-window {
            width: 100%;
            max-width: 960px;
            display: flex;
            flex-direction: column;
            background: #cbd0d4;
        }

        /* メニューバー */
        .menu-bar {
            display: flex;
            background: #cbd0d4;
            padding: 2px 6px;
            gap: 12px;
            border-bottom: 1px solid #808080;
        }
        .menu-item {
            cursor: pointer;
            font-size: 12px;
        }

        /* メインエリア */
        .main-content {
            display: flex;
            background: #cbd0d4;
            padding: 3px;
            gap: 2px;
        }

        /* 左側ツールボックス */
        .toolbox {
            width: 56px; 
            background: #cbd0d4;
            padding: 2px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;
        }

        /* 16個のボタンをきれいな2列グリッドにする */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 24px);
            grid-auto-rows: 22px;
            gap: 1px;
        }

        /* ボタンの見た目とオープンソース画像の読み込み */
        .tool-btn {
            background: #cbd0d4;
            border: 1.5px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 0;
            cursor: pointer;
            background-image: url('https://win98icons.alexmeub.com/images/paint-sprites.png');
            background-repeat: no-repeat;
        }

        .tool-btn:active, .tool-btn.selected {
            border-color: #808080 #fff #fff #808080;
            background-color: #e4e4e4;
        }

        /* 各ボタンのアイコン切り出し位置（スペースなし） */
        .icon-freehand-select{background-position:3px 2px;}
        .icon-select{background-position:-13px 2px;}
        .icon-eraser{background-position:-29px 2px;}
        .icon-fill{background-position:-45px 2px;}
        .icon-dropper{background-position:-61px 2px;}
        .icon-magnifier{background-position:-77px 2px;}
        .icon-pencil{background-position:-93px 2px;}
        .icon-brush{background-position:-109px 2px;}
        .icon-airbrush{background-position:-125px 2px;}
        .icon-text{background-position:-141px 2px;}
        .icon-line{background-position:-157px 2px;}
        .icon-curve{background-position:-173px 2px;}
        .icon-rectangle{background-position:-189px 2px;}
        .icon-polygon{background-position:-205px 2px;}
        .icon-ellipse{background-position:-221px 2px;}
        .icon-rounded-rectangle{background-position:-237px 2px;}

        /* キャンバス容器 */
        .canvas-container {
            flex-grow: 1;
            background: #808080;
            padding: 4px;
            box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #fff;
            display: flex;
            overflow: scroll; /* 💡 ここを scroll に書き換える */
        }
        /* 白いキャンバス本体 */
        .paint-canvas {
            background: #ffffff;
            width: 100%;
            min-height: 450px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
        }

        /* 下部カラーボックス */
        .color-box {
            background: #cbd0d4;
            padding: 4px;
            border-top: 1px solid #808080;
            display: flex;
            align-items: center;
        }
        .color-palette {
            display: flex;
            flex-direction: column;
            gap: 1px;
            margin-left: 5px;
        }
        .palette-row {
            display: flex;
            gap: 1px;
        }
        .color-swatch {
            width: 13px;
            height: 13px;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;
        }
    </style>
</head>
<body>

    <!-- ウィンドウ全体（これがあると95.cssの立体感が効くようになります） -->
    <div class="window paint-window">

        <!-- 1. タイトルバー -->
        <div class="title-bar" style="background: linear-gradient(90deg, #000080, #1084d0); padding: 3px 2px 3px 3px;">
            <div class="title-bar-text" style="color: white; font-weight: bold; font-size: 17px; display: flex; align-items: center; gap: 4px;">
                🎨  You can draw and save your artwork. お絵描きして保存できます。
            </div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <!-- 2. メニューバー（崩れないように調整） -->
        <div class="menu-bar" style="display: flex; background: #cbd0d4; padding: 2px 6px; gap: 12px; border-bottom: 1px solid #808080; align-items: center;">
            <a href="#" id="saveBtn" download="paint-art.png" style="cursor: pointer; font-size: 17px; text-decoration: none; color: #000; line-height: 1;">💾Save</a>
            <div class="menu-item" style="cursor: pointer; font-size: 20px; line-height: 1;"> </div>
            <div class="menu-item" style="cursor: pointer; font-size: 20px; line-height: 1;"> </div>
            <div class="menu-item" style="cursor: pointer; font-size: 20px; line-height: 1;"> </div>
            <div class="menu-item" style="cursor: pointer; font-size: 20px; line-height: 1;"> </div>
            <div class="menu-item" style="cursor: pointer; font-size: 20px; line-height: 1;"> </div>
        </div>

        <!-- 3. 作業エリア -->
        <div class="main-content">
            
            <!-- 左側：ツールボックス -->
            <div class="toolbox">
                <div class="tool-grid">
                    <button class="tool-btn" title="自由選択">✂</button>
                    <button class="tool-btn" title="選択">⚿</button>
                    <button class="tool-btn" title="消しゴム">▰</button>
                    <button class="tool-btn" title="塗りつぶし">🪣</button>
                    <button class="tool-btn" title="色の選択">🧪</button>
                    <button class="tool-btn" title="虫眼鏡">🔍</button>
                    <button class="tool-btn" title="鉛筆">✎</button>
                    <button class="tool-btn" title="ブラシ">🖌</button>
                    <button class="tool-btn" title="エアブラシ">░</button>
                    <button class="tool-btn" title="テキスト" style="font-family:'Times New Roman'; font-size:14px;">A</button>
                    <button class="tool-btn" title="直線">╱</button>
                    <button class="tool-btn" title="曲線">～</button>
                    <button class="tool-btn" title="長方形">▭</button>
                    <button class="tool-btn" title="多角形" style="font-size:8px;">多角</button>
                    <button class="tool-btn" title="楕円">◯</button>
                    <button class="tool-btn" title="角丸長方形">▢</button>
                </div>
            </div>

            <!-- 中央キャンバス -->
            <div class="canvas-container">
                <!-- 💡 div から canvas タグに変更し、id とサイズを追加します -->
                <canvas id="paintCanvas" class="paint-canvas" width="800" height="450"></canvas>
            </div>

        </div>

        <!-- 4. 下部カラーパレット（実物と同じ2段の並びに修正） -->
        <div class="color-box">
            <div class="color-palette">
                <div class="palette-row">
                    <div class="color-swatch" style="background: #000000;"></div>
                    <div class="color-swatch" style="background: #808080;"></div>
                    <div class="color-swatch" style="background: #800000;"></div>
                    <div class="color-swatch" style="background: #808000;"></div>
                    <div class="color-swatch" style="background: #008000;"></div>
                    <div class="color-swatch" style="background: #008080;"></div>
                    <div class="color-swatch" style="background: #000080;"></div>
                    <div class="color-swatch" style="background: #800080;"></div>
                    <div class="color-swatch" style="background: #808040;"></div>
                    <div class="color-swatch" style="background: #004040;"></div>
                    <div class="color-swatch" style="background: #0080ff;"></div>
                    <div class="color-swatch" style="background: #004080;"></div>
                    <div class="color-swatch" style="background: #400080;"></div>
                    <div class="color-swatch" style="background: #804000;"></div>
                </div>
                <div class="palette-row">
                    <div class="color-swatch" style="background: #ffffff;"></div>
                    <div class="color-swatch" style="background: #c0c0c0;"></div>
                    <div class="color-swatch" style="background: #ff0000;"></div>
                    <div class="color-swatch" style="background: #ffff00;"></div>
                    <div class="color-swatch" style="background: #00ff00;"></div>
                    <div class="color-swatch" style="background: #00ffff;"></div>
                    <div class="color-swatch" style="background: #0000ff;"></div>
                    <div class="color-swatch" style="background: #ff00ff;"></div>
                    <div class="color-swatch" style="background: #ffff80;"></div>
                    <div class="color-swatch" style="background: #00ff80;"></div>
                    <div class="color-swatch" style="background: #80ffff;"></div>
                    <div class="color-swatch" style="background: #8080ff;"></div>
                    <div class="color-swatch" style="background: #ff8000;"></div>
                    <div class="color-swatch" style="background: #ff8080;"></div>
                </div>
            </div>
        </div>

        <!-- 5. ステータスバー -->
        <div class="status-bar">
            <p class="status-field" style="margin: 0; padding: 2px 4px; font-size: 17px;">You can draw and save your artwork.</p>
        </div>

    </div> <!-- 💡 ここに足りなかった </div> を足してウィンドウを綺麗に閉じました -->

    <!-- 💡 ここから動かすためのJavaScriptコード -->
    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // 線の設定（黒色、太さ2ピクセル、ドット感を出すために角を四角に）
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 1;
        ctx.lineCap = 'square';
        ctx.lineJoin = 'miter';

        // マウスを押したとき（描画開始）
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            ctx.beginPath();
            // キャンバス内での正確なマウス位置を計算
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });

        // マウスを動かしたとき（線を引く）
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });

        // マウスを離したとき・キャンバスから外れたとき（描画終了）
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);
        document.getElementById('saveBtn').addEventListener('click', function() {
            this.href = canvas.toDataURL('image/png');
        });
    </script>
</body>
</html>
