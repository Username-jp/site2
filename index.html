<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>チャンマナ</title>
    
    <!-- Windows 95/98風のデザインシステム -->
    <link rel="stylesheet" href="https://unpkg.com/95.css">
    
    <style>
        /* 画面全体を左右に並べる設定 */
        body {
            background-color: #55aaaa;
            padding: 20px;
            margin: 0;
            font-family: "MS Sans Serif", "MS Pゴシック", sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px; /* 左のペイントと右のサイドバーのすき間 */
            flex-wrap: wrap; /* 画面が狭いスマホの時は自動で縦並びにする */
        }

        /* 左側：ペイントのウィンドウ全体 */
        .window.paint-window {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            background: #cbd0d4;
            border: none !important;
            box-shadow: 1px 1px 0px #0a0a0a, 
                        -1px -1px 0px #fff, 
                        2px 2px 0px #808080, 
                        -2px -2px 0px #cbd0d4, 
                        3px 3px 6px rgba(0,0,0,0.3);
        }

        /* メニューバー */
        .menu-bar {
            display: flex;
            background: #cbd0d4;
            padding: 2px 6px;
            gap: 12px;
            border-bottom: 1px solid #808080;
        }
        .menu-item {
            cursor: pointer;
            font-size: 12px;
        }

        /* メインエリア */
        .main-content {
            display: flex;
            background: #cbd0d4;
            padding: 3px;
            gap: 2px;
        }

        /* 左側ツールボックス */
        .toolbox {
            width: 56px; 
            background: #cbd0d4;
            padding: 2px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;
        }

        /* 16個のボタンをきれいな2列グリッドにする */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 24px);
            grid-auto-rows: 22px;
            gap: 1px;
        }

        /* ボタンの見た目 */
        .tool-btn {
            background: #cbd0d4;
            border: 1.5px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 0;
            cursor: pointer;
            background-image: url('https://win98icons.alexmeub.com/images/paint-sprites.png');
            background-repeat: no-repeat;
        }

        .tool-btn:active, .tool-btn.selected {
            border-color: #808080 #fff #fff #808080;
            background-color: #e4e4e4;
        }

        /* 各ボタンのアイコン切り出し位置 */
        .icon-freehand-select{background-position:3px 2px;}
        .icon-select{background-position:-13px 2px;}
        .icon-eraser{background-position:-29px 2px;}
        .icon-fill{background-position:-45px 2px;}
        .icon-dropper{background-position:-61px 2px;}
        .icon-magnifier{background-position:-77px 2px;}
        .icon-pencil{background-position:-93px 2px;}
        .icon-brush{background-position:-109px 2px;}
        .icon-airbrush{background-position:-125px 2px;}
        .icon-text{background-position:-141px 2px;}
        .icon-line{background-position:-157px 2px;}
        .icon-curve{background-position:-173px 2px;}
        .icon-rectangle{background-position:-189px 2px;}
        .icon-polygon{background-position:-205px 2px;}
        .icon-ellipse{background-position:-221px 2px;}
        .icon-rounded-rectangle{background-position:-237px 2px;}

        /* キャンバス容器 */
        .canvas-container {
            flex-grow: 1;
            max-width: 100%;       
            height: 450px;         
            background: #cbd0d4 !important;
            box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #fff;
            overflow: scroll;      
            display: inline-block; 
        }

        /* 白いキャンバス本体 */
        .paint-canvas {
            background: #ffffff;
            display: block; 
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
            flex-shrink: 0;        
        }

        /* 下部カラーボックス */
        .color-box {
            background: #cbd0d4;
            padding: 4px;
            border-top: 1px solid #808080;
            display: flex;
            align-items: center;
        }
        .color-palette {
            display: flex;
            flex-direction: column;
            gap: 1px;
            margin-left: 5px;
        }
        .palette-row {
            display: flex;
            gap: 1px;
        }
        .color-swatch {
            width: 13px;
            height: 13px;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;
        }

        /* スクロールバーのデザイン */
        .canvas-container::-webkit-scrollbar {
            width: 16px !important;  
            height: 16px !important; 
            background: #dfdfdf !important;
        }
        .canvas-container::-webkit-scrollbar-track {
            background-image: linear-gradient(45deg, #cbd0d4 25%, transparent 25%), 
                              linear-gradient(-45deg, #cbd0d4 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #cbd0d4 75%), 
                              linear-gradient(-45deg, transparent 75%, #cbd0d4 75%) !important;
            background-size: 2px 2px !important;
            background-color: #fff !important;
        }
        .canvas-container::-webkit-scrollbar-thumb {
            background: #cbd0d4 !important;
            border-radius: 0px !important; 
            box-shadow: inset 1px 1px 0px #fff, inset -1px -1px 0px #808080 !important; 
            border: 1px solid !important;
            border-color: #fff #0a0a0a #0a0a0a #fff !important; 
        }
        .canvas-container::-webkit-scrollbar-corner {
            background: #cbd0d4 !important;
        }

        /* 💡 右側サイドバー（ウィンドウを縦に積み重ねるコンテナ） */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 240px;
            min-width: 200px;
        }

        /* 右側：各ウィンドウの共通設定 */
        .window.sidebar-window {
            width: 100%;
            background: #cbd0d4;
            border: none !important;
            box-shadow: 1px 1px 0px #0a0a0a, 
                        -1px -1px 0px #fff, 
                        2px 2px 0px #808080, 
                        -2px -2px 0px #cbd0d4, 
                        3px 3px 6px rgba(0,0,0,0.3);
        }

        /* ウィンドウの中身の余白 */
        .sidebar-window .window-body {
            padding: 10px;
            margin: 0;
        }

        /* リンクの箇条書き */
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-list a {
            color: #0000ee;
            text-decoration: underline;
            font-size: 14px;
        }
        .link-list a:visited {
            color: #551a8b;
        }
        /* 💡 ランダム画像表示エリアのスタイル */
        .random-box {
            background: #ffffff;
            box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #fff;
            padding: 4px;
            margin-top: 6px;
            text-align: center;
        }
        .random-box img {
            max-width: 100%;
            height: auto;
            display: block;
            border: 1px solid #808080;
            margin: 0 auto;
        }
    </style>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 1;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            ctx.beginPath();
            const pos = getEventPos(e);
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault(); 
            const pos = getEventPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

document.getElementById('saveBtn').addEventListener('click', function() {
            // 1. キャンバスの絵をPNG画像（データ）に変換
            const imgData = canvas.toDataURL('image/png');
            
            // 2. 先に新しいタブ（ウィンドウ）を開く

                        <title>paint-art.png</title>
                        <style>
                            body { margin: 0; background: #55aaaa; display: flex; justify-content: center; align-items: center; height: 100vh; }
                            img { max-width: 100%; max-height: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background: #fff; }
                        </style>
                    </head>
                    <body>
                        <img src="${imgData}" alt="画廊">
                    </body>
                </html>
            `);
            newWindow.document.close();
        });
        
        // 🎨 パレットの色をクリックしたときに描画色を変える処理
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', function() {
                // クリックされたマスの背景色（RGB形式など）を取得
                const selectedColor = this.style.backgroundColor;
                
                // 描画色（線の色）にセット
                ctx.strokeStyle = selectedColor;
            });
            
            // マウスカーソルをポインター（手の形）にして、クリックできることをわかりやすくする
            swatch.style.cursor = 'pointer';
        });
