<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aki's Digital Creations - Paint - portfolio.html</title>
    
    <!-- Windows 95/98風のデザインシステムを読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/95.css">
    
    <style>
        /* 画面全体の設定 */
        body {
            background-color: #55aaaa; /* あの懐かしい青緑色 */
            padding: 20px;
            margin: 0;
            font-family: "MS Sans Serif", "MS Pゴシック", sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ペイントのウィンドウ全体のサイズと見た目 */
        .window.paint-window {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
        }

        /* メニューバー（横並びにする） */
        .menu-bar {
            display: flex;
            background: #cbd0d4;
            padding: 2px 6px;
            gap: 10px;
        }
        .menu-item {
            cursor: pointer;
            padding: 2px 4px;
        }

        /* メインの作業領域（ツールBOX ＋ キャンバス）を横並びに */
        .main-content {
            display: flex;
            background: #cbd0d4;
            padding: 4px;
        }

        /* ツールボックス全体の枠組み */
        .toolbox {
            width: 56px; 
            background: #cbd0d4;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px;
            margin-right: 4px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* 16個のボタンをきれいな2列のグリッドにする */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 24px);
            grid-auto-rows: 22px;
            gap: 1px;
        }

        /* ツールボタンの立体感とコミュニティのオープンソース画像をセット */
        .tool-btn {
            background: #cbd0d4;
            border: 1.5px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 0;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://win98icons.alexmeub.com/images/paint-sprites.png');
            background-repeat: no-repeat;
            background-size: auto;
        }

        /* 各ボタンに表示するドット絵の位置（隙間なし） */
        .icon-freehand-select{background-position:3px 2px;}
        .icon-select{background-position:-13px 2px;}
        .icon-eraser{background-position:-29px 2px;}
        .icon-fill{background-position:-45px 2px;}
        .icon-dropper{background-position:-61px 2px;}
        .icon-magnifier{background-position:-77px 2px;}
        .icon-pencil{background-position:-93px 2px;}
        .icon-brush{background-position:-109px 2px;}
        .icon-airbrush{background-position:-125px 2px;}
        .icon-text{background-position:-141px 2px;}
        .icon-line{background-position:-157px 2px;}
        .icon-curve{background-position:-173px 2px;}
        .icon-rectangle{background-position:-189px 2px;}
        .icon-polygon{background-position:-205px 2px;}
        .icon-ellipse{background-position:-221px 2px;}
        .icon-rounded-rectangle{background-position:-237px 2px;}

        /* キャンバス（作品エリア）の背景グレー部分 */
        .canvas-container {
            flex-grow: 1;
            background: #808080;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        /* 白いキャンバスそのものの立体感 */
        .paint-canvas {
            background: white;
            width: 100%;
            min-height: 400px;
            padding: 20px;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
            box-sizing: border-box;
        }

        /* 下部：カラーパレット */
        .color-box {
            background: #cbd0d4;
            padding: 5px;
            border-top: 2px solid #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-palette {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .palette-row {
            display: flex;
            gap: 2px;
        }
    </style>
</head>
<body>

    <!-- 👇全体を「.window」というクラスで囲むことで95.cssを強制発動させます -->
    <div class="window paint-window">

        <!-- 1. 最上部：タイトルバー -->
        <div class="title-bar">
            <div class="title-bar-text">
                Aki's Digital Creations - Paint - portfolio.html
            </div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <!-- 2. メニューバー -->
        <div class="menu-bar">
            <div class="menu-item">ファイル(F)</div>
            <div class="menu-item">編集(E)</div>
            <div class="menu-item">表示(V)</div>
            <div class="menu-item">変形(I)</div>
            <div class="menu-item">色(C)</div>
            <div class="menu-item">ヘルプ(H)</div>
        </div>

        <!-- 3. メイン作業エリア（ツールBOX ＋ キャンバス） -->
        <div class="main-content">
            
            <!-- 左側：ツールボックス（16個のアイコン） -->
            <div class="toolbox">
                <div class="tool-grid">
                    <button class="tool-btn icon-freehand-select" title="自由選択"></button>
                    <button class="tool-btn icon-select" title="選択"></button>
                    <button class="tool-btn icon-eraser" title="消しゴム"></button>
                    <button class="tool-btn icon-fill" title="塗りつぶし"></button>
                    <button class="tool-btn icon-dropper" title="色の選択"></button>
                    <button class="tool-btn icon-magnifier" title="虫眼鏡"></button>
                    <button class="tool-btn icon-pencil" title="鉛筆"></button>
                    <button class="tool-btn icon-brush" title="ブラシ"></button>
                    <button class="tool-btn icon-airbrush" title="エアブラシ"></button>
                    <button class="tool-btn icon-text" title="テキスト"></button>
                    <button class="tool-btn icon-line" title="直線"></button>
                    <button class="tool-btn icon-curve" title="曲線"></button>
                    <button class="tool-btn icon-rectangle" title="長方形"></button>
                    <button class="tool-btn icon-polygon" title="多角形"></button>
                    <button class="tool-btn icon-ellipse" title="楕円"></button>
                    <button class="tool-btn icon-rounded-rectangle" title="角丸長方形"></button>
                </div>
            </div>

            <!-- 中央：キャンバス -->
            <div class="canvas-container">
                <div class="paint-canvas">
                    <div class="portfolio-content">
                        <div class="canvas-title">
                            <h2 style="margin: 0; font-size: 1.5rem;">AKI'S DIGITAL CREATIONS</h2>
                            <h1 style="margin: 10px 0; font-size: 2.5rem; letter-spacing: 2px;">PORTFOLIO</h1>
                        </div>
                        <p style="color: #666;">（ここにあなたのイラストなどの画像が表示されます）</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- 4. 下部：カラーパレット -->
        <div class="color-box">
            <div class="color-palette">
                <div class="palette-row">
                    <div class="color-swatch" style="background: #000000; width:14px; height:14px; border:1px solid #808080;"></div>
                    <div class="color-swatch" style="background: #808080; width:14px; height:14px; border:1px solid #808080;"></div>
                    <div class="color-swatch" style="background: #800000; width:14px; height:14px; border:1px solid #808080;"></div>
                    <div class="color-swatch" style="background: #808000; width:14px; height:14px; border:1px solid #808080;"></div>
                </div>
                <div class="palette-row">
                    <div class="color-swatch" style="background: #ffffff; width:14px; height:14px; border:1px solid #808080;"></div>
                    <div class="color-swatch" style="background: #c0c0c0; width:14px; height:14px; border:1px solid #808080;"></div>
                    <div class="color-swatch" style="background: #ff0000; width:14px; height:14px; border:1px solid #808080;"></div>
                    <div class="color-swatch" style="background: #ffff00; width:14px; height:14px; border:1px solid #808080;"></div>
                </div>
            </div>
        </div>

        <!-- 5. 最下部：ステータスバー -->
        <div class="status-bar">
            <p class="status-field" style="margin: 0; padding: 2px 4px;">Ready. Click an icon to explore.</p>
        </div>

    </div>

</body>
</html>
